{% extends 'partials/base.html' %}

{% block body %}

<div class="landing-container">
	<div class="landing-card">
		<h1 class="landing-title">SideQuest</h1>
		<p class="landing-subtitle">Road trip detours, your way</p>

		<div class="auth-tabs">
			<button type="button" class="auth-tab active" data-tab="login">Log In</button>
			<button type="button" class="auth-tab" data-tab="signup">Sign Up</button>
		</div>

		<div class="auth-panel active" id="login-panel">
			<form id="login-form" class="auth-form">
				<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
				<div class="field-container">
					<input type="email" name="email" placeholder="Email" autocomplete="email" required>
				</div>
				<div class="field-container">
					<input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
				</div>
				<div class="form-error" id="login-error"></div>
				<div class="form-actions">
					<button type="submit">Log In</button>
				</div>
			</form>
		</div>

		<div class="auth-panel" id="signup-panel">
			<form id="signup-form" class="auth-form">
				<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
				<div class="field-container">
					<input type="text" name="first_name" placeholder="First name" autocomplete="given-name" required>
				</div>
				<div class="field-container">
					<input type="text" name="last_name" placeholder="Last name" autocomplete="family-name" required>
				</div>
				<div class="field-container">
					<input type="email" name="email" placeholder="Email" autocomplete="email" required>
				</div>
				<div class="field-container">
					<input type="email" name="verify_email" placeholder="Verify email" autocomplete="email" required>
				</div>
				<div class="field-container">
					<input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
				</div>
				<div class="field-container">
					<input type="password" name="verify_password" placeholder="Repeat password" autocomplete="new-password" required>
				</div>
				<div class="form-error" id="signup-error"></div>
				<div class="form-actions">
					<button type="submit">Sign Up</button>
				</div>
			</form>
		</div>
	</div>
</div>

{% endblock %}

{% block script %}
<script>
document.addEventListener('DOMContentLoaded', function() {
	// Tab switching
	document.querySelectorAll('.auth-tab').forEach(function(tab) {
		tab.addEventListener('click', function() {
			var target = this.dataset.tab;
			document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.remove('active'); });
			document.querySelectorAll('.auth-panel').forEach(function(p) { p.classList.remove('active'); });
			this.classList.add('active');
			document.getElementById(target + '-panel').classList.add('active');
		});
	});

	// Login form
	document.getElementById('login-form').addEventListener('submit', function(e) {
		e.preventDefault();
		var form = this;
		var errorEl = document.getElementById('login-error');
		errorEl.textContent = '';

		var data = new FormData(form);
		fetch('/account/login', {
			method: 'POST',
			body: data,
			headers: {
				'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content,
				'X-Requested-With': 'XMLHttpRequest'
			}
		}).then(function(r) {
			if (r.ok) return r.json();
			return r.json().then(function(err) { throw err; });
		}).then(function(res) {
			window.location.href = '/map';
		}).catch(function(err) {
			var msg = (err && (err.email || err.password) && (err.email[0] || err.password[0])) || 'Login failed';
			errorEl.textContent = typeof msg === 'string' ? msg : 'Login failed';
		});
	});

	// Signup form
	document.getElementById('signup-form').addEventListener('submit', function(e) {
		e.preventDefault();
		var form = this;
		var errorEl = document.getElementById('signup-error');
		errorEl.textContent = '';

		var data = new FormData(form);
		fetch('/account/register', {
			method: 'POST',
			body: data,
			headers: {
				'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content,
				'X-Requested-With': 'XMLHttpRequest'
			}
		}).then(function(r) {
			if (r.ok) return r.text();
			return r.json().then(function(err) { throw err; });
		}).then(function() {
			window.location.href = '/map';
		}).catch(function(err) {
			var msg = 'Sign up failed';
			if (err && typeof err === 'object') {
				var first = Object.values(err)[0];
				if (first && first[0]) msg = first[0];
			}
			errorEl.textContent = msg;
		});
	});
});
</script>
{% endblock %}
