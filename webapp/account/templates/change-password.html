{% extends 'partials/base.html' %}

{% block body %}

<h1> {{ title }} </h1>

<form method="post">
    {{ form.csrf_token }}

    {{ macros.form_field(form.current_password) }}

    <br/>
    
    {{ macros.form_field(form.new_password) }}
    {{ macros.form_field(form.verify_new_password) }}

    <br/>

    {{ macros.field_input(form.submit) }}
</form>

{% endblock %}
