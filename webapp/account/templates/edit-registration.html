{% extends 'partials/base.html' %}

{% block body %}

<h1> {{ title }} </h1>

<form method="post">
    {{ form.csrf_token }}

    {{ macros.form_field(form.first_name) }}
    {{ macros.form_field(form.last_name) }}

    <br/>

    {{ macros.form_field(form.email) }}
    <a href="{{endpoint.account_change_password.url()}}">Change Password</a>

    <br/><br/>

    {{ macros.field_input(form.submit) }}
</form>

{% endblock %}
