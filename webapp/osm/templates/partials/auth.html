<div id="panel-auth" class="auth-widget">
    <button class="auth-toggle" onclick="authToggle()">
        <i class="fa-regular fa-circle-user guest-show"></i>
        <i class="fa-solid fa-circle-user auth-show"></i>
    </button>

    <div id="auth-dropdown" class="auth-dropdown" hidden>
        <div class="guest-show">
            <div class="header">
                <button id="tab-login" class="auth-tab active" type="button" onclick="authTab('login')">
                    Sign In
                </button>
                <button id="tab-register" class="auth-tab" type="button" onclick="authTab('register')">
                    Sign Up
                </button>
            </div>

            <form id="login-form">
                <div class="field">
                    <input type="text" name="login" placeholder="Username or Email" autocomplete="username" required>
                </div>
                <div class="field">
                    <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
                </div>
                <div class="field" style="text-align: right;">
                    <button type="button" class="link-button" onclick="authForgotPassword()">
                        Forgot password?
                    </button>
                </div>
                <p id="login-error" class="form-error"></p>
            </form>

            <form id="register-form" style="display: none;">
                <div class="field">
                    <input type="text" name="username" placeholder="Username" autocomplete="username" required>
                </div>
                <div class="field">
                    <input type="email" name="email" placeholder="Email" autocomplete="email" required>
                </div>
                <div class="field">
                    <input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
                </div>
                <div class="field">
                    <input type="password" name="verify_password" placeholder="Repeat password" autocomplete="new-password" required>
                </div>
                <p id="register-error" class="form-error"></p>
            </form>

            <div class="footer">
                <button id="auth-btn" class="primary-button" type="button" onclick="authSubmit()">
                    Sign in
                </button>
            </div>
        </div>

        <div class="auth-show">
            <p class="auth-username">
                Signed in as <strong id="user-name">{% if current_user.is_authenticated %}{{ current_user.username }}{% endif %}</strong>
            </p>
            <div class="footer">
                <button class="secondary-button" type="button" onclick="authLogout()">Log Out</button>
            </div>
        </div>
    </div>
</div>
