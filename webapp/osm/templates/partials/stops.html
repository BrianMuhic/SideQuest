<div id="panel-stops" class="panel stops" hidden>
    <div class="header">
        <button class="back" data-panel="prefs">← Preferences</button>
        <h2 class="title">Choose Your Stops</h2>
        <div id="stops-summary-pills" class="summary-pills"></div>
    </div>

    <div class="body">
        <div class="panel-section">
            <h3 class="panel-section__title">Selected Stops</h3>
            <div id="selected-list" class="selected-list">
                <p class="muted-text">No stops selected yet.</p>
            </div>
        </div>

        <div class="panel-section">
            <h3 class="panel-section__title">Browse Stops</h3>
            <div id="stops-feed"></div>
        </div>
    </div>

    <div class="footer">
        <button id="preview-route-button" class="primary-button" disabled>
            Preview Entire Route
        </button>
        <a href="/" class="secondary-link">Start New Route</a>
    </div>
</div>
