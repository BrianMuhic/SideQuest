<div id="panel-route-detail" class="panel route-detail" hidden>
    <div class="header">
        <button class="back" data-panel="stops">← Stops</button>
        <h2 class="title">Your Route</h2>
        <div id="route-detail-summary" class="route-detail-summary">
            <p class="loading-hint">Loading route details…</p>
        </div>
    </div>

    <div class="body">
        <div id="itinerary"></div>
    </div>

    <div class="footer">
        <a id="apple-maps-link" class="primary-button" href="#" target="_blank" rel="noopener">
            Open in Apple Maps
        </a>
        <a id="google-maps-link" class="primary-button" href="#" target="_blank" rel="noopener">
            Open in Google Maps
        </a>
        <a href="/" class="secondary-link">Start New Route</a>
    </div>
</div>
