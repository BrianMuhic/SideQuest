{% extends 'partials/base.html' %}

{% block head %}
<link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
/>
{% endblock head %}

{% block style %}
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }

    body {
        overflow: hidden;
    }

    main {
        margin: 0 !important;
        padding: 0 !important;
        height: 100vh;
        overflow: hidden;
    }

    footer {
        display: none;
    }

    .page-shell {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
    }

    #map {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
    }

    .map-overlay {
        position: absolute;
        top: 24px;
        left: 84px;
        z-index: 1000;
        width: 360px;
        background: rgba(255, 255, 255, 0.97);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .map-overlay label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        color: #1f2937;
    }

    .input-group {
        position: relative;
        margin-bottom: 14px;
    }

    .map-overlay input {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 1rem;
        box-sizing: border-box;
        background: #ffffff;
    }

    .map-overlay input:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .suggestions-list {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        margin: 0;
        padding: 6px 0;
        list-style: none;
        background: #ffffff;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
        max-height: 220px;
        overflow-y: auto;
        z-index: 1100;
        display: none;
    }

    .suggestions-list.show {
        display: block;
    }

    .suggestions-item {
        padding: 10px 14px;
        font-size: 0.95rem;
        color: #1f2937;
        cursor: pointer;
        line-height: 1.35;
    }

    .suggestions-item:hover {
        background: #eff6ff;
    }

    .primary-button,
    .secondary-button {
        width: 100%;
        border: none;
        border-radius: 10px;
        padding: 13px 16px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s ease;
    }

    .primary-button {
        margin-bottom: 10px;
    }

    .secondary-button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
    }

    .route-summary {
        margin-top: 12px;
        padding: 14px 16px;
        border-radius: 10px;
        background: #f3f4f6;
        color: #374151;
        font-size: 0.95rem;
        display: none;
    }

    .route-summary-list {
        margin: 0;
        padding-left: 20px;
    }

    .route-summary-list li {
        margin-bottom: 6px;
    }

    .route-summary-list li:last-child {
        margin-bottom: 0;
    }

    .leaflet-popup-content {
        font-size: 0.95rem;
    }

    @media (max-width: 700px) {
        .page-shell {
            height: calc(100vh - 48px);
            min-height: calc(100vh - 48px);
        }

        .map-overlay {
            top: 14px;
            left: 72px;
            right: 14px;
            width: auto;
        }
    }
</style>
{% endblock style %}

{% block body %}
<div class="page-shell">
    <div class="map-overlay">
        <form id="route-form">
            <label for="start-location">Start destination</label>
            <div class="input-group">
                <input
                    type="text"
                    id="start-location"
                    name="start"
                    placeholder="Enter starting location"
                    autocomplete="off"
                />
                <ul id="start-suggestions" class="suggestions-list"></ul>
            </div>

            <label for="end-location">End destination</label>
            <div class="input-group">
                <input
                    type="text"
                    id="end-location"
                    name="end"
                    placeholder="Enter destination"
                    autocomplete="off"
                />
                <ul id="end-suggestions" class="suggestions-list"></ul>
            </div>

            <button type="submit" class="primary-button">Build Route</button>

            <button
                type="button"
                id="adventure-button"
                class="secondary-button"
                disabled
            >
                Looks Good! Let’s Map Out Our Adventure.
            </button>
        </form>

        <form id="adventure-form" method="POST" action="/adventure" style="display: none;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" id="hidden-start-location" name="start_location">
            <input type="hidden" id="hidden-end-location" name="end_location">
            <input type="hidden" id="hidden-duration-text" name="duration_text">
            <input type="hidden" id="hidden-distance-text" name="distance_text">
        </form>

        <div class="route-summary" id="route-summary"></div>
    </div>

    <div id="map"></div>
</div>
{% endblock body %}

{% block script %}
<script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
></script>

<script>
    const map = L.map("map").setView([37.2296, -80.4139], 8);

    setTimeout(function () {
        map.invalidateSize();
    }, 100);

    window.addEventListener("resize", function () {
        map.invalidateSize();
    });

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    let routeLayer = null;
    let startMarker = null;
    let endMarker = null;
    let activeStartRequest = null;
    let activeEndRequest = null;
    let routeRequestCounter = 0;
    let latestRouteData = null;

    const routeForm = document.getElementById("route-form");
    const adventureForm = document.getElementById("adventure-form");
    const adventureButton = document.getElementById("adventure-button");
    const routeSummary = document.getElementById("route-summary");
    const startInput = document.getElementById("start-location");
    const endInput = document.getElementById("end-location");
    const startSuggestions = document.getElementById("start-suggestions");
    const endSuggestions = document.getElementById("end-suggestions");
    const hiddenStartLocation = document.getElementById("hidden-start-location");
    const hiddenEndLocation = document.getElementById("hidden-end-location");
    const hiddenDurationText = document.getElementById("hidden-duration-text");
    const hiddenDistanceText = document.getElementById("hidden-distance-text");

    function formatDuration(totalMinutes) {
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;

        if (hours > 0 && minutes > 0) {
            return `${hours} hr ${minutes} min`;
        }

        if (hours > 0) {
            return `${hours} hr`;
        }

        return `${minutes} min`;
    }

    function showMessage(message) {
        routeSummary.style.display = "block";
        routeSummary.innerHTML = message;
    }

    function showRouteSummary(durationMinutes, distanceMiles) {
        routeSummary.style.display = "block";
        routeSummary.innerHTML = `
            <ul class="route-summary-list">
                <li><strong>Estimated Time:</strong> ${formatDuration(durationMinutes)}</li>
                <li><strong>Distance:</strong> ${distanceMiles} miles</li>
            </ul>
        `;
    }

    function hideSuggestions(listElement) {
        listElement.innerHTML = "";
        listElement.classList.remove("show");
    }

    function clearRoutePreview() {
        if (routeLayer) {
            map.removeLayer(routeLayer);
            routeLayer = null;
        }

        if (startMarker) {
            map.removeLayer(startMarker);
            startMarker = null;
        }

        if (endMarker) {
            map.removeLayer(endMarker);
            endMarker = null;
        }

        latestRouteData = null;
        adventureButton.disabled = true;
        routeSummary.style.display = "none";
        routeSummary.innerHTML = "";
    }

    function renderSuggestions(items, listElement, inputElement) {
        listElement.innerHTML = "";

        if (!items.length) {
            listElement.classList.remove("show");
            return;
        }

        items.forEach((item) => {
            const suggestionItem = document.createElement("li");
            suggestionItem.className = "suggestions-item";
            suggestionItem.textContent = item.label;

            suggestionItem.addEventListener("mousedown", function (event) {
                event.preventDefault();
                inputElement.value = item.label;
                hideSuggestions(listElement);
            });

            listElement.appendChild(suggestionItem);
        });

        listElement.classList.add("show");
    }

    function attachAutocomplete(inputElement, listElement, type) {
        let debounceTimer = null;

        inputElement.addEventListener("input", function () {
            const query = inputElement.value.trim();

            if (type === "start" && activeStartRequest) {
                activeStartRequest.abort();
            }

            if (type === "end" && activeEndRequest) {
                activeEndRequest.abort();
            }

            clearTimeout(debounceTimer);

            if (query.length < 3) {
                hideSuggestions(listElement);
                return;
            }

            debounceTimer = setTimeout(async function () {
                const controller = new AbortController();

                if (type === "start") {
                    activeStartRequest = controller;
                } else {
                    activeEndRequest = controller;
                }

                try {
                    const response = await fetch(
                        `/api/location-suggestions?q=${encodeURIComponent(query)}&_=${Date.now()}`,
                        {
                            signal: controller.signal,
                            method: "GET",
                            cache: "no-store",
                            headers: {
                                "Cache-Control": "no-cache"
                            }
                        }
                    );

                    if (!response.ok) {
                        hideSuggestions(listElement);
                        return;
                    }

                    const items = await response.json();
                    renderSuggestions(items, listElement, inputElement);
                } catch (error) {
                    if (error.name !== "AbortError") {
                        console.error(error);
                    }
                }
            }, 250);
        });

        inputElement.addEventListener("blur", function () {
            setTimeout(function () {
                hideSuggestions(listElement);
            }, 150);
        });

        inputElement.addEventListener("focus", function () {
            if (listElement.children.length > 0) {
                listElement.classList.add("show");
            }
        });
    }

    function drawRoute(data) {
        clearRoutePreview();

        routeLayer = L.geoJSON(data.route, {
            style: {
                color: "#2563eb",
                weight: 5,
                opacity: 0.9
            }
        }).addTo(map);

        startMarker = L.marker([data.start.lat, data.start.lon])
            .addTo(map)
            .bindPopup(`<strong>Start</strong><br>${data.start.name}`);

        endMarker = L.marker([data.end.lat, data.end.lon])
            .addTo(map)
            .bindPopup(`<strong>End</strong><br>${data.end.name}`);

        const bounds = routeLayer.getBounds();
        if (bounds.isValid()) {
            map.fitBounds(bounds, { padding: [50, 50] });
        }

        latestRouteData = data;
        showRouteSummary(data.duration_minutes, data.distance_miles);
        adventureButton.disabled = false;
    }

    attachAutocomplete(startInput, startSuggestions, "start");
    attachAutocomplete(endInput, endSuggestions, "end");

    routeForm.addEventListener("submit", async function (event) {
        event.preventDefault();

        const start = startInput.value.trim();
        const end = endInput.value.trim();

        if (!start || !end) {
            clearRoutePreview();
            showMessage("Please enter both a start and end destination.");
            return;
        }

        hideSuggestions(startSuggestions);
        hideSuggestions(endSuggestions);

        clearRoutePreview();
        showMessage("Building route preview...");

        const currentRequestId = ++routeRequestCounter;

        try {
            const response = await fetch(
                `/api/route-preview?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}&_=${Date.now()}`,
                {
                    method: "GET",
                    cache: "no-store",
                    headers: {
                        "Cache-Control": "no-cache"
                    }
                }
            );

            const data = await response.json();

            if (currentRequestId !== routeRequestCounter) {
                return;
            }

            if (!response.ok) {
                showMessage(data.error || "Unable to build route preview.");
                return;
            }

            drawRoute(data);
        } catch (error) {
            console.error(error);
            showMessage("Something went wrong while building the route.");
        }
    });

    adventureButton.addEventListener("click", function () {
        if (!latestRouteData) {
            return;
        }

        hiddenStartLocation.value = latestRouteData.start.name;
        hiddenEndLocation.value = latestRouteData.end.name;
        hiddenDurationText.value = formatDuration(latestRouteData.duration_minutes);
        hiddenDistanceText.value = `${latestRouteData.distance_miles} miles`;

        adventureForm.submit();
    });

    document.addEventListener("click", function (event) {
        if (!event.target.closest(".input-group")) {
            hideSuggestions(startSuggestions);
            hideSuggestions(endSuggestions);
        }
    });
</script>
{% endblock script %}
