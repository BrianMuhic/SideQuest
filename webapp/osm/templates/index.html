{% extends 'partials/base.html' %}

{% block body %}

<div class="modal top-right guest-show" id="auth-modal">
	<div class="modal_header">
		<span class="modal_tab active" id="tab-login" onclick="authTab('login')">Login</span>
		<span class="modal_tab" id="tab-register" onclick="authTab('register')">Sign up</span>
	</div>
	<div class="modal_body">
		<form id="login-form">
			<div class="field">
				<input type="text" name="username" placeholder="Username" autocomplete="username">
			</div>
			<div class="field">
				<input type="password" name="password" placeholder="Password" autocomplete="current-password">
			</div>
			<div class="form-error" id="login-error"></div>
		</form>
		<form id="register-form" style="display:none">
			<div class="field">
				<input type="text" name="username" placeholder="Username" autocomplete="username">
			</div>
			<div class="field">
				<input type="password" name="password" placeholder="Password" autocomplete="new-password">
			</div>
			<div class="field">
				<input type="password" name="verify_password" placeholder="Confirm password">
			</div>
			<div class="form-error" id="register-error"></div>
		</form>
	</div>
	<div class="modal_footer">
		<button id="auth-btn" onclick="authSubmit()">Sign in</button>
	</div>
</div>

<div class="modal top-right auth-show" id="user-modal">
	<div class="modal_header">
		<span id="user-name">{% if current_user.is_authenticated %}{{ current_user.username }}{% endif %}</span>
	</div>
	<div class="modal_footer">
		<button class="cancel" onclick="authLogout()">Sign Out</button>
	</div>
</div>

{% endblock %}
